stages:
  - test
  - build
  - sync
  - deploy

test:
  stage: test
  image: golang:1.24
  script:
    - go test ./...

build-image:
  stage: build
  image: docker:stable
  services:
    - docker:dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker save "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -o ocuspot-image.tar
  artifacts:
    expire_in: 1 day
    paths:
      - ocuspot-image.tar

# sync-github: push accepted default-branch changes from GitLab (primary) to GitHub.
# GitHub workflow skips back-sync for merges whose message references the sync/github- prefix.
# Uses $OCUSPOT_GITHUB_TOKEN (masked CI variable) only.
sync-github:
  stage: sync
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -e
      git remote add github "https://oauth2:${OCUSPOT_GITHUB_TOKEN}@github.com/Alberto-Kali/ocuspot-deploy-demo.git" || true
      git fetch github main || true
      git push github HEAD:refs/heads/main

deploy-carrier:
  stage: deploy
  image: alpine:latest
  needs:
    - job: build-image
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache ca-certificates curl openssh-client sshpass
    - test -n "$OCUSPOT_SSH_PRIVATE_KEY" || { test -n "$OCUSPOT_CARRIER_SSH_PASSWORD" && test -n "$OCUSPOT_GATEWAY_SSH_PASSWORD"; }
    - test -f deploy/deploy.sh
    - mkdir -p ~/.ssh
    - if [ -n "$OCUSPOT_SSH_PRIVATE_KEY" ]; then printf '%s\n' "$OCUSPOT_SSH_PRIVATE_KEY" > ~/.ssh/ocuspot_deploy_key && chmod 600 ~/.ssh/ocuspot_deploy_key && printf 'Host *\n  IdentityFile ~/.ssh/ocuspot_deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config; else printf 'Host *\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config; fi
  script:
    - cd deploy
    - sed "s|__OCUSPOT_IMAGE__|${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}|g" deploy.sh > deploy.runtime.sh
    - chmod 700 deploy.runtime.sh
    - IMAGE_TAR="../ocuspot-image.tar" RATHOLE_BIN="${RATHOLE_BIN:-}" ./deploy.runtime.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - deploy/
