stages:
  - test
  - build
  - sync
  - deploy

test:
  stage: test
  image: golang:1.24
  script:
    - go test ./...

build-image:
  stage: build
  image: docker:stable
  services:
    - docker:dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

# sync-github: push accepted default-branch changes from GitLab (primary) to GitHub.
# GitHub workflow skips back-sync for merges whose message references the sync/github- prefix.
# Uses $OCUSPOT_GITHUB_TOKEN (masked CI variable) only.
sync-github:
  stage: sync
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -e
      git remote add github "https://oauth2:${OCUSPOT_GITHUB_TOKEN}@github.com/Alberto-Kali/ocuspot-deploy-demo.git" || true
      git fetch github main || true
      git push github HEAD:main

deploy-carrier:
  stage: deploy
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    OCUSPOT_DEPLOY_DIR: ".ocuspot-deploy"
    OCUSPOT_CONTROL_DIR: ".ocuspot-control"
  before_script:
    - apk add --no-cache ca-certificates git openssh-client sshpass
    - test -n "$OCUSPOT_CONTROL_REPO_URL"
    - test -n "$OCUSPOT_GITLAB_TOKEN"
    - test -n "$OCUSPOT_SSH_PRIVATE_KEY" || { test -n "$OCUSPOT_CARRIER_SSH_PASSWORD" && test -n "$OCUSPOT_GATEWAY_SSH_PASSWORD"; }
    - test -x "${OCUSPOT_CLI:-./ocuspot}"
    - mkdir -p ~/.ssh
    - if [ -n "$OCUSPOT_SSH_PRIVATE_KEY" ]; then printf '%s\n' "$OCUSPOT_SSH_PRIVATE_KEY" > ~/.ssh/ocuspot_deploy_key && chmod 600 ~/.ssh/ocuspot_deploy_key && printf 'Host *\n  IdentityFile ~/.ssh/ocuspot_deploy_key\n  IdentitiesOnly yes\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config; else printf 'Host *\n  StrictHostKeyChecking accept-new\n' > ~/.ssh/config; fi
    - rm -rf "$OCUSPOT_CONTROL_DIR"
    - AUTH_CONTROL_URL="$(printf '%s' "$OCUSPOT_CONTROL_REPO_URL" | sed "s#^https://#https://oauth2:${OCUSPOT_GITLAB_TOKEN}@#")"
    - git clone --depth 1 "$AUTH_CONTROL_URL" "$OCUSPOT_CONTROL_DIR"
  script:
    - rm -rf "$OCUSPOT_DEPLOY_DIR"
    - OCUSPOT_LOCAL_CONTROL_DIR="$OCUSPOT_CONTROL_DIR" "${OCUSPOT_CLI:-./ocuspot}" deploy bundle --project "ocuspot-deploy-demo" --image "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" --subdomain "ocuspot-demo" --carrier "backend-kvm" --gateway "pconf-bus" --out "$OCUSPOT_DEPLOY_DIR" --apply
    - cd "$OCUSPOT_DEPLOY_DIR"
    - RATHOLE_BIN="${RATHOLE_BIN:-}" ./deploy.sh
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .ocuspot-deploy/
